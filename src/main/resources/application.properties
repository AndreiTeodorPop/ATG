# =============================================================================
# Castorama ATG Commerce — Application Configuration
# ATG analogy: DYNAMO_HOME/localconfig/atg/dynamo/service/Initial.properties
#              and environment-specific layer overrides
# =============================================================================

spring.application.name=castorama-atg

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.port=8080
server.servlet.context-path=/

# -----------------------------------------------------------------------------
# H2 In-Memory Database
# Simulates ATG GSA (Generic SQL Adapter) repositories backed by an Oracle schema.
# In production: replace with Oracle/PostgreSQL datasource and ATG GSA DDL scripts.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/castorama_atg;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console — for development inspection (http://localhost:8080/h2-console)
# JDBC URL: jdbc:h2:file:./data/castorama_atg
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# -----------------------------------------------------------------------------
# JPA / Hibernate
# ATG GSA analogy: item descriptor schema management.
# DDL auto = create-drop in dev; in production use validate + Flyway/Liquibase
# with proper ATG GSA DDL scripts.
# -----------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# Dyn/Admin Configuration
# ATG analogy: /atg/dynamo/admin/AdminPasswordHasher.properties
# Credentials are for the /dyn/admin/** HTTP Basic Auth chain only.
# NEVER commit production passwords — override via environment variables:
#   CASTORAMA_ADMIN_USERNAME / CASTORAMA_ADMIN_PASSWORD
# -----------------------------------------------------------------------------
castorama.admin.username=admin
castorama.admin.password=admin123

# -----------------------------------------------------------------------------
# JWT Configuration
# ATG analogy: /atg/dynamo/security/http/ Nucleus component properties
# -----------------------------------------------------------------------------
castorama.jwt.secret=castorama-atg-demo-secret-key-minimum-32-characters-long
castorama.jwt.expiration-seconds=86400

# -----------------------------------------------------------------------------
# Logging
# ATG analogy: DYNAMO_HOME/localconfig/atg/dynamo/service/logging.properties
# -----------------------------------------------------------------------------
logging.level.com.castorama.atg=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# Suppress noisy Hibernate statistics in dev
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=ERROR

# -----------------------------------------------------------------------------
# Jackson (JSON serialisation)
# -----------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# -----------------------------------------------------------------------------
# Swagger / OpenAPI
# -----------------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# -----------------------------------------------------------------------------
# Validation
# -----------------------------------------------------------------------------
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
